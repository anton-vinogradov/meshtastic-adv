; M5Stack Cardputer ADV — advui custom UI.
; Additive overlay: extends the stock cardputer-adv env, adds our own LovyanGFX
; UI. No upstream files are modified; this variant is copied into the pristine
; firmware tree at build time and picked up by the variants/*/*/platformio.ini glob.
[env:m5stack-cardputer-adv-advui]
extends = env:m5stack-cardputer-adv
build_flags =
  ${env:m5stack-cardputer-adv.build_flags}
  -D MESHTASTIC_EXCLUDE_SCREEN      ; suppress the stock graphics::Screen; our OSThread UI drives the panel
  -D MESHTASTIC_EXCLUDE_INPUTBROKER ; we read the TCA8418 keyboard ourselves (AdvKeyboard)
  ; Companion mode shrinks the (unused) local node DB to give its DRAM to the
  ; BLE link — the cap becomes our runtime function (AdvNodeCap.cpp), which
  ; keeps the stock flash-size tiering in local mode. The lambda carries its
  ; own extern declaration so no header has to reach every user of the macro.
  '-D MAX_NUM_NODES=([]{ extern int advui_max_num_nodes(); return advui_max_num_nodes(); }())'
; The stock keyboard files reference the now-excluded inputBroker and would fight
; our reader for the TCA8418 FIFO — drop them from the build.
build_src_filter =
  ${esp32_common.build_src_filter}
  -<input/CardputerKeyboard.cpp>
  -<input/kbI2cBase.cpp>
  -<input/cardKbI2cImpl.cpp>
; Upstream strips the NimBLE central/observer roles from the prebuilt stack (the
; node is only ever a peripheral for the phone). The companion mode needs both —
; scanning for and connecting to another node — so put them back; pioarduino
; rebuilds the framework libs from this sdkconfig.
custom_sdkconfig =
  ${esp32s3_base.custom_sdkconfig}
  CONFIG_BT_NIMBLE_ROLE_CENTRAL=y
  CONFIG_BT_NIMBLE_ROLE_OBSERVER=y
  ; upstream pins the controller to 2 BLE activities (advertise + one connection);
  ; scanning and the companion link each need their own slot
  CONFIG_BT_CTRL_BLE_MAX_ACT=6
  ; The stock prebuilt framework ships with the C++ exceptions runtime on (legacy
  ; CONFIG_CXX_EXCEPTIONS=y), and Meshtastic relies on it: getFiles() catches
  ; bad_alloc to shrink the phone-API file manifest on a tight heap. Our
  ; custom_sdkconfig rebuild silently lost it, turning that graceful fallback
  ; into an abort() the moment a phone connected on low memory.
  CONFIG_COMPILER_CXX_EXCEPTIONS=y
  CONFIG_COMPILER_CXX_EXCEPTIONS_EMG_POOL_SIZE=0
lib_deps =
  ${env:m5stack-cardputer-adv.lib_deps}
  lovyan03/LovyanGFX@1.2.24
